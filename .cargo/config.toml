[build]
rustflags = ["--cfg", "web_sys_unstable_apis"]
target = "x86_64-unknown-linux-musl"

# target rustflags replace build.rustflags, so web_sys_unstable_apis is repeated here
[target.wasm32-unknown-unknown]
rustflags = [
    "--cfg", "web_sys_unstable_apis",
    # getrandom 0.4 requires opting into the JS backend on wasm
    "--cfg", "getrandom_backend=\"wasm_js\"",
]
